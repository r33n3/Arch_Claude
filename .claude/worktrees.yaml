# .claude/worktrees.yaml
# CCA Foundations Course — Sprint 1
# Run from repo root: ./launch-worktrees.sh

base_branch: main
worktree_path: .claude/worktrees
max_worktrees: 4
tmux_session: worktrees
setup_commands: []
launch_mode: sequential
foundation_task: foundation

shared_risk_files:
  - CLAUDE.md
  - README.md
  - .gitignore

ignore_paths:
  - .git
  - .student_cca
  - .playwright-mcp

tasks:
  - name: foundation
    description: |
      Build the course foundation: CLAUDE.md bootstrap logic (session detection, persona
      loading, first-time vs returning student orientation), .student_cca/ template files
      (student.md with 4 persona options + switch instructions, progress.md tracking
      structure), README.md prerequisites section, and .gitignore. This is the scaffold
      everything else builds on — no domain content, just the instructor engine and
      student state system. Follow the Noctua pattern from docs/specs/cca-course-build-spec.md.
      CLAUDE.md must stay under 80 lines. .student_cca/ must be gitignored.

  - name: onboarding
    description: |
      Build the Day 0 onboarding experience: domains/day-0-onboarding.md and
      exercises/opening-exercise.md. Day 0 explains the course structure, all 5 domains
      with exam weight percentages, how the instructor system works, and walks the student
      through persona selection. The opening exercise dynamically generates a coordinator +
      2 subagents scenario based on student background (collected during Day 0), with the
      instructor narrating each step of execution in the student's chosen persona voice.
      After the demo, debrief maps observed behavior to Domain 1 CCA concepts. Student
      background data should use fictional enterprise scenarios from the build-spec
      (FinClearance Corp, MedRoute Health, BuildOps Inc, SecurePath Systems). Depends on
      foundation task completing first.

